services:
  geosearch-build-index:
    build:
      context: .
      dockerfile: Dockerfile.geosearch
    command:
      - geo-ingest
      - prepare
      - --config
      - /app/countries/colombia.toml
      - --input
      - /app/data/sample/colombia.csv
      - --output
      - /data/colombia-index
    volumes:
      - geosearch-data:/data

  geosearch-api:
    build:
      context: .
      dockerfile: Dockerfile.geosearch
    depends_on:
      geosearch-build-index:
        condition: service_completed_successfully
    environment:
      GEO_CONFIG: /app/countries/colombia.toml
      GEO_INDEX: /data/colombia-index
      GEO_BIND: 0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - geosearch-data:/data
    healthcheck:
      test: ["CMD", "geo-ingest", "stats", "--index", "/data/colombia-index"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s

volumes:
  geosearch-data:
